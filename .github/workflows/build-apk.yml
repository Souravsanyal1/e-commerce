name: Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: Rename & Organize APKs
        run: |
          mkdir -p build-assets
          # Copy Split APKs
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build-assets/demo-ecommerce-arm32.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build-assets/demo-ecommerce-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk build-assets/demo-ecommerce-x86_64.apk || true
          # Copy Universal APK
          cp build/app/outputs/flutter-apk/app-release.apk build-assets/demo-ecommerce-universal.apk || true

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build-assets/*

      - name: Create Release (On Tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-assets/demo-ecommerce-universal.apk
            build-assets/demo-ecommerce-arm64.apk
            build-assets/demo-ecommerce-arm32.apk
            build-assets/demo-ecommerce-x86_64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
